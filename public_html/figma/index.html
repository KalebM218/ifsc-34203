<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Figma Design | Kaleb Mackie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to right, #1e3a8a, #2563eb);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
 
    h1 { font-size: 2rem; margin-bottom: 10px; }
    p  { opacity: 0.85; margin-bottom: 30px; }
 
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
 
    .grid-item {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
    }
 
    .grid-item:hover {
      transform: translateY(-5px);
    }
 
    .grid-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }
 
    .grid-item p {
      color: #1e3a8a;
      font-weight: bold;
      margin: 0;
      padding: 12px;
      font-size: 0.9rem;
    }
 
    .back {
      display: inline-block;
      margin-top: 40px;
      color: white;
      text-decoration: underline;
      opacity: 0.8;
    }
  </style>
</head>
<body>
 
  <h1>Figma Design — Mending Minds</h1>
  <p>Website design mockups and wireframes.</p>
 
  <div class="grid">
 
    <div class="grid-item">
      <img src="screenshot1.png" alt="Mending Minds homepage design">
      <p>Homepage</p>
    </div>
 
    <div class="grid-item">
      <img src="screenshot2.png" alt="Mending Minds about page design">
      <p>About Page</p>
    </div>
 
    <div class="grid-item">
      <img src="screenshot3.png" alt="Mending Minds services page design">
      <p>Services Page</p>
    </div>
 
    <div class="grid-item">
      <img src="screenshot4.png" alt="Mending Minds contact page design">
      <p>Contact Page</p>
    </div>
 
    <div class="grid-item">
      <img src="screenshot5.png" alt="Mending Minds design screenshot 5">
      <p>Mobile View</p>
    </div>
 
    <div class="grid-item">
      <img src="screenshot6.png" alt="Mending Minds design screenshot 6">
      <p>Color & Typography</p>
    </div>
 
  </div>
 
  <a class="back" href="../../index.html">← Back to course index</a>
 
</body>
</html>

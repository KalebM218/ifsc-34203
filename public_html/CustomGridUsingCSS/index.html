<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom CSS Grid Assignment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header>
    <h1>My Custom CSS Grid</h1>
  </header>

  <div id="content">
    <h2>Main Content</h2>
    <p>This section is placed in the first column of the grid.</p>
  </div>

  <aside>
    <h2>Sidebar</h2>
    <p>This section sits in the second column.</p>
  </aside>

  <footer>
    <p>Footer content goes here.</p>
  </footer>

</div>

</body>
</html>
